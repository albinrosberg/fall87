<!doctype html>
<!-- Kommentarer --> 

<html lang='sv'>
	<head> 
        <meta charset='utf-8'>
        <title>Arkivarien</title> 
        <link rel='stylesheet' href='style.css'>
        <style>
        	body {
                text-align: center;
                background-image: linear-gradient(to left, rgb(45, 43, 43) 50%,  ivory 50%);
                color:aliceblue;
            }
            #information {
                width: 50%;
                float: left;
                color: rgb(45, 43, 43);
            }
            #id {
                width: 50%;
                float: left;
                color: ivory;  
            }
            h2 {
                text-align: left;
                padding-left: 25px;
            }
            img {
                height: 45%;
            }
            #info {
                width: 100%;
                padding: 12px;
                text-align: center;
            }
            #scanCounter {
                position:absolute;
                top:5px;
                right:5px;
                background:rgb(45, 43, 43);
                color:ivory;
                padding:4px 8px;
                border-radius:8px;
            }
            #timeUpOverlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;

                background: rgb(45, 43, 43);
                color: red;

                display: none; 

                justify-content: center;
                align-items: center;

                z-index: 9999;
            }

            #timeUpOverlay h1 {
                font-size: 4em;
                text-align: center;
            }

        </style>
    </head>
    
    <body>
        <div id="information">
            <h1>Arkivarien</h1>
            <table id="info">
                <tr>
                    <td style="width:33%; text-align: center; font-size: 125%;">Uppgift:</td>
                </tr>
            </table>
            <br> 
            <h2>Som arkivaren har du förmågan att genomsöka vittnens brottsregister efter avviskelser.</h2>
            <h2>Använd din förmåga till största kapacitet för att lösa brottet!</h2>
        </div>
        <div id="id">
            <h1> ID-kort </h1>
             <img src="../characters/images/c14.png" width = 52%, height = 52%>
        </div>
            <div id="scanCounter"></div>
            <div id="timeUpOverlay">
                <h1>Tiden är slut!</h1>
            </div>

        <script>
         localStorage.setItem("playerRole", "arkivarie");
        </script>
        
        <script>
            let timeLeft = Number(localStorage.getItem("timeLeft"));

            if (timeLeft === null) {
            alert("Skanna startkoden först!");
            }

            timeLeft = Number(timeLeft);

            if (timeLeft <= 0) {
            document.getElementById("timeUpOverlay").style.display = "flex";
        
            } else {
            timeLeft -= 10;
            localStorage.setItem("timeLeft", timeLeft);
            }
        </script>
        <script>
            let time = Number(localStorage.getItem("timeLeft"));

            let hours = Math.floor(time / 60);
            let minutes = time % 60;

            document.getElementById("scanCounter").innerText =
            "Tid kvar: " + hours + "h " + minutes + "m";
        </script>
    </body> 
</html>
