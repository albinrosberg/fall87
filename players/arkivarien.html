<!doctype html>
<!-- Kommentarer --> 

<html lang='sv'>
	<head> 
        <meta charset='utf-8'>
        <title>Arkivarien</title> 
        <link rel="shortcut icon" type="image/png" href="../logo.png">
        <link rel='stylesheet' href='style.css'>
        <style>
        	body {
    margin: 0;
    text-align: center;
    font-family: "Courier New", monospace;

    background: linear-gradient(to left, #2b2b2b 50%, ivory 50%);
    color: #2b2b2b;
}

#id {
    width: 50%;
    float: left;
    color: ivory;
    padding-top: 20px;
}

#information {
    width: 50%;
    float: left;
    background: ivory;
    color: #2b2b2b;
    min-height: 100vh;
}

h2 {
    text-align: left;
    padding-left: 25px;
    border-left: 4px solid #caca90; 
    padding-left: 10px;
}

img {
    height: 45%;
    border: 3px solid #caca90;
    border-radius: 6px;
}

#info {
    width: 100%;
    padding: 12px;
    text-align: center;
    border-top: 2px solid #caca90;
    border-bottom: 2px solid #caca90;
}

p {
    font-size: 1.1em;
    line-height: 1.5;
}

#information::before {
    display: block;
    text-align: left;
    padding: 10px 20px;
    font-size: 0.8em;
    letter-spacing: 2px;
    color: #caca90;
}

#scanCounter {
    position: fixed;
    top: 10px;
    right: 10px;

    background: #2b2b2b;
    color: ivory;

    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #caca90;

    font-size: 0.9em;
}
#timeUpOverlay {
    position: fixed;
    inset: 0;

    background: #0a0d10;
    color: #ff3b3b;

    display: none;
    justify-content: center;
    align-items: center;
}

#timeUpOverlay h1 {
    font-size: 4em;
    letter-spacing: 2px;
}
@media (max-width: 768px) {

    #id, #information {
        width: 100%;
        float: none;
        background-color: ivory;
        color: #2b2b2b;
    }

    img {
        width: 80%;
        height: auto;
    }
}


        </style>
    </head>
    
    <body>
        <div id="information">
            <br>
            <h1>Arkivarien</h1>
            <table id="info">
                <tr>
                    <td style="width:33%; text-align: center; font-size: 125%;">Uppgift:</td>
                </tr>
            </table>
            <br> 
            <h2>Som arkivaren har du förmågan att genomsöka vittnens brottsregister efter avviskelser.</h2>
            <h2>Använd din förmåga till största kapacitet för att lösa brottet!</h2>
        </div>
        <div id="id">
            <h1> ID-kort </h1>
             <img src="images/arkivarie.png" width = 52%, height = 52%>
        </div>
            <div id="scanCounter"></div>
            <div id="timeUpOverlay">
                <h1>Tiden är slut!</h1>
            </div>

        <script>
         localStorage.setItem("playerRole", "arkivarie");
        </script>
        
        <script>
            let timeLeft = Number(localStorage.getItem("timeLeft"));

            if (timeLeft === null) {
            alert("Skanna startkoden först!");
            }

            timeLeft = Number(timeLeft);

            if (timeLeft <= 0) {
            document.getElementById("timeUpOverlay").style.display = "flex";
        
            } else {
            timeLeft -= 10;
            localStorage.setItem("timeLeft", timeLeft);
            }
        </script>
        <script>
            let time = Number(localStorage.getItem("timeLeft"));

            let hours = Math.floor(time / 60);
            let minutes = time % 60;

            document.getElementById("scanCounter").innerText =
            "Tid kvar: " + hours + "h " + minutes + "m";
        </script>
    </body> 
</html>
