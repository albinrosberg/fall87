<!doctype html>
<!-- Kommentarer --> 

<html lang='sv'>
	<head> 
        <meta charset='utf-8'>
        <title>Obducenten</title> 
        <link rel='stylesheet' href='style.css'>
        <style>

body {
    margin: 0;
    text-align: center;
    font-family: "Courier New", monospace;

    background: linear-gradient(to left, #1c1f24 50%, #e8f5f0 50%);
    color: #cfd8dc;
}

#id {
    width: 50%;
    float: left;
    color: #e8f5f0;
    padding-top: 20px;
}

#information {
    width: 50%;
    float: left;
    background: #e8f5f0;
    color: #1c1f24;
    min-height: 100vh;
}

h2 {
    text-align: left;
    padding-left: 15px;
    border-left: 4px solid #4fa3a5; 
    margin-left: 10px;
}

img {
    height: 45%;
    border: 3px solid #4fa3a5;
    border-radius: 4px;
    filter: contrast(1.05) grayscale(10%); 
}

#info {
    width: 100%;
    padding: 12px;
    text-align: center;
    border-top: 2px solid #4fa3a5;
    border-bottom: 2px solid #4fa3a5;
}

p {
    font-size: 1.05em;
    line-height: 1.5;
}

#information::before {
    display: block;
    text-align: left;
    padding: 10px 20px;
    font-size: 0.8em;
    letter-spacing: 2px;
    color: #4fa3a5;
}

#scanCounter {
    position: fixed;
    top: 10px;
    right: 10px;

    background: #1c1f24;
    color: #e8f5f0;

    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #4fa3a5;

    font-size: 0.9em;
}

#timeUpOverlay {
    position: fixed;
    inset: 0;

    background: #0a0d10;
    color: #ff3b3b;

    display: none;
    justify-content: center;
    align-items: center;
}

#timeUpOverlay h1 {
    font-size: 4em;
    letter-spacing: 2px;
}

@media (max-width: 768px) {

    #id, #information {
        width: 100%;
        float: none;
    }

    img {
        width: 80%;
        height: auto;
    }
}

        </style>
    </head>
    
    <body>
        <div id="information">
        <br>
            <h1>Obducenten</h1>
            <table id="info">
                <tr>
                    <td style="width:33%; text-align: center; font-size: 125%;">Uppgift:</td>
                </tr>
            </table>
            <br> 
            <h2>Obducenten har i uppgift att leta efter märkvärdiga spår och sår.</h2>
            <h2>Var noggrann och ta in varje detalj. Skulle du finna något, kanske det är lösningen på brottet!</h2>
        </div>
        <div id="id">
            <h1> ID-kort </h1>
             <img src="../characters/images/c14.png" width = 52%, height = 52%>
        </div>
            <div id="scanCounter"></div>
            <div id="timeUpOverlay">
                <h1>Tiden är slut!</h1>
            </div>

        <script>
            localStorage.setItem("playerRole", "obducent");
        </script>
        
        <script>
            let timeLeft = Number(localStorage.getItem("timeLeft"));

            if (timeLeft === null) {
            alert("Skanna startkoden först!");
            }

            timeLeft = Number(timeLeft);

            if (timeLeft <= 0) {
            document.getElementById("timeUpOverlay").style.display = "flex";
        
            } else {
            timeLeft -= 10;
            localStorage.setItem("timeLeft", timeLeft);
            }
        </script>
        <script>
            let time = Number(localStorage.getItem("timeLeft"));

            let hours = Math.floor(time / 60);
            let minutes = time % 60;

            document.getElementById("scanCounter").innerText =
            "Tid kvar: " + hours + "h " + minutes + "m";
        </script>
    </body> 
</html>
